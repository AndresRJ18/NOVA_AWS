<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioCapture Module Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .volume-meter {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .volume-bar {
            height: 100%;
            background-color: #4CAF50;
            transition: width 0.1s;
        }
        .info-box {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>AudioCapture Module Test</h1>
    
    <div id="status" class="status info">
        Ready to test audio capture
    </div>

    <div class="info-box">
        <h3>Browser Support</h3>
        <p id="support-info">Checking...</p>
    </div>

    <div>
        <button id="requestPermBtn">1. Request Permission</button>
        <button id="startCaptureBtn" disabled>2. Start Capture</button>
        <button id="stopCaptureBtn" disabled>3. Stop Capture</button>
    </div>

    <div class="info-box">
        <h3>Volume Level</h3>
        <div class="volume-meter">
            <div id="volumeBar" class="volume-bar" style="width: 0%"></div>
        </div>
        <p>Level: <span id="volumeLevel">0</span>%</p>
    </div>

    <div class="info-box">
        <h3>Audio Format</h3>
        <pre id="formatInfo">Not available</pre>
    </div>

    <div class="info-box">
        <h3>Capture Info</h3>
        <p>Duration: <span id="duration">0</span>s</p>
        <p>Data size: <span id="dataSize">0</span> bytes</p>
        <p>Chunks received: <span id="chunkCount">0</span></p>
    </div>

    <script src="audio-capture.js"></script>
    <script>
        const audioCapture = new AudioCapture();
        let captureStartTime = 0;
        let chunkCount = 0;
        let volumeUpdateInterval = null;

        // UI elements
        const statusDiv = document.getElementById('status');
        const supportInfo = document.getElementById('support-info');
        const requestPermBtn = document.getElementById('requestPermBtn');
        const startCaptureBtn = document.getElementById('startCaptureBtn');
        const stopCaptureBtn = document.getElementById('stopCaptureBtn');
        const volumeBar = document.getElementById('volumeBar');
        const volumeLevel = document.getElementById('volumeLevel');
        const formatInfo = document.getElementById('formatInfo');
        const durationSpan = document.getElementById('duration');
        const dataSizeSpan = document.getElementById('dataSize');
        const chunkCountSpan = document.getElementById('chunkCount');

        // Check browser support
        if (audioCapture.isSupported()) {
            supportInfo.textContent = '✓ Browser supports audio capture';
            supportInfo.style.color = 'green';
        } else {
            supportInfo.textContent = '✗ Browser does not support required audio APIs';
            supportInfo.style.color = 'red';
            requestPermBtn.disabled = true;
        }

        // Display audio format
        const format = audioCapture.getAudioFormat();
        formatInfo.textContent = JSON.stringify(format, null, 2);

        // Request permission
        requestPermBtn.addEventListener('click', async () => {
            try {
                updateStatus('Requesting microphone permission...', 'info');
                requestPermBtn.disabled = true;
                
                await audioCapture.requestPermission();
                
                updateStatus('✓ Permission granted! Ready to capture.', 'success');
                startCaptureBtn.disabled = false;
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                requestPermBtn.disabled = false;
            }
        });

        // Start capture
        startCaptureBtn.addEventListener('click', async () => {
            try {
                updateStatus('Starting audio capture...', 'info');
                startCaptureBtn.disabled = true;
                chunkCount = 0;
                captureStartTime = Date.now();
                
                await audioCapture.startCapture((audioChunk) => {
                    chunkCount++;
                    chunkCountSpan.textContent = chunkCount;
                });
                
                updateStatus('✓ Recording... Speak into your microphone!', 'success');
                stopCaptureBtn.disabled = false;
                
                // Start volume level updates
                volumeUpdateInterval = setInterval(() => {
                    const level = audioCapture.getVolumeLevel();
                    volumeLevel.textContent = level;
                    volumeBar.style.width = level + '%';
                    
                    const duration = ((Date.now() - captureStartTime) / 1000).toFixed(1);
                    durationSpan.textContent = duration;
                }, 100);
                
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                startCaptureBtn.disabled = false;
            }
        });

        // Stop capture
        stopCaptureBtn.addEventListener('click', () => {
            try {
                updateStatus('Stopping audio capture...', 'info');
                stopCaptureBtn.disabled = true;
                
                // Stop volume updates
                if (volumeUpdateInterval) {
                    clearInterval(volumeUpdateInterval);
                    volumeUpdateInterval = null;
                }
                
                const audioData = audioCapture.stopCapture();
                const duration = ((Date.now() - captureStartTime) / 1000).toFixed(1);
                
                dataSizeSpan.textContent = audioData.byteLength.toLocaleString();
                
                updateStatus(
                    `✓ Capture complete! Recorded ${duration}s of audio (${audioData.byteLength.toLocaleString()} bytes)`,
                    'success'
                );
                
                startCaptureBtn.disabled = false;
                
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                stopCaptureBtn.disabled = false;
            }
        });

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            audioCapture.release();
        });
    </script>
</body>
</html>
