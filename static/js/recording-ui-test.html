<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecordingUI Component Test</title>
    <link rel="stylesheet" href="../css/recording-ui.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 1.875rem;
            font-weight: 700;
        }
        .header p {
            margin: 0.5rem 0 0;
            opacity: 0.9;
        }
        .controls {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .btn-control {
            padding: 0.75rem 1.5rem;
            font-size: 0.875rem;
            font-weight: 600;
            color: white;
            background: #6b7280;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-control:hover {
            background: #4b5563;
        }
        .status {
            padding: 1rem;
            background: #f3f4f6;
            border-radius: 8px;
            font-size: 0.875rem;
        }
        .status-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #e5e7eb;
        }
        .status-item:last-child {
            border-bottom: none;
        }
        .status-label {
            font-weight: 600;
            color: #374151;
        }
        .status-value {
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ RecordingUI Component Test</h1>
            <p>Test voice recording controls and visual feedback</p>
        </div>

        <div id="recording-container"></div>

        <div class="controls">
            <h3 style="margin: 0;">Manual State Controls</h3>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button class="btn-control" onclick="setStateIdle()">Set Idle</button>
                <button class="btn-control" onclick="setStateRecording()">Set Recording</button>
                <button class="btn-control" onclick="setStateProcessing()">Set Processing</button>
                <button class="btn-control" onclick="setStateSpeaking()">Set Speaking</button>
            </div>

            <h3 style="margin: 1rem 0 0;">Playback Controls Test</h3>
            <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
                <button class="btn-control" onclick="testPlayAudio()">Test Play Audio</button>
                <button class="btn-control" onclick="testPausePlayback()">Test Pause</button>
                <button class="btn-control" onclick="testReplayAudio()">Test Replay</button>
            </div>

            <div class="status">
                <div class="status-item">
                    <span class="status-label">Current State:</span>
                    <span class="status-value" id="current-state">idle</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Volume Level:</span>
                    <span class="status-value" id="volume-level">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Playback Progress:</span>
                    <span class="status-value" id="playback-progress">0</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Controls Enabled:</span>
                    <span class="status-value" id="controls-enabled">true</span>
                </div>
            </div>
        </div>
    </div>

    <script src="audio-capture.js"></script>
    <script src="audio-playback.js"></script>
    <script src="websocket-client.js"></script>
    <script src="recording-ui.js"></script>
    <script>
        // Initialize RecordingUI
        const recordingUI = new RecordingUI('recording-container');

        // Create mock modules
        const audioCapture = new AudioCapture();
        const audioPlayback = new AudioPlayback();
        const websocketClient = new WebSocketClient();

        // Set modules
        recordingUI.setModules(audioCapture, audioPlayback, websocketClient);

        // Set up callbacks
        recordingUI.onStateChange((newState, oldState) => {
            console.log(`State changed: ${oldState} -> ${newState}`);
            updateStatus();
        });

        recordingUI.onRecordingComplete((audioData) => {
            console.log('Recording complete:', audioData.byteLength, 'bytes');
        });

        recordingUI.onError((error) => {
            console.error('RecordingUI error:', error);
            alert(`Error: ${error.message}`);
        });

        // Manual state control functions
        function setStateIdle() {
            recordingUI.setAudioState('idle');
        }

        function setStateRecording() {
            recordingUI.setAudioState('recording');
            // Simulate volume updates
            simulateVolumeUpdates();
        }

        function setStateProcessing() {
            recordingUI.setAudioState('processing');
        }

        function setStateSpeaking() {
            recordingUI.setAudioState('speaking');
        }

        // Simulate volume updates for testing
        let volumeSimInterval = null;
        function simulateVolumeUpdates() {
            if (volumeSimInterval) {
                clearInterval(volumeSimInterval);
            }

            volumeSimInterval = setInterval(() => {
                if (recordingUI.getAudioState() !== 'recording') {
                    clearInterval(volumeSimInterval);
                    volumeSimInterval = null;
                    return;
                }

                // Simulate random volume level
                const volume = Math.floor(Math.random() * 100);
                audioCapture.volumeLevel = volume;
                updateStatus();
            }, 100);
        }

        // Update status display
        function updateStatus() {
            document.getElementById('current-state').textContent = recordingUI.getAudioState();
            document.getElementById('volume-level').textContent = recordingUI.getVolumeLevel();
            document.getElementById('playback-progress').textContent = recordingUI.getPlaybackProgress();
            document.getElementById('controls-enabled').textContent = recordingUI.areControlsEnabled();
        }

        // Playback control test functions
        function testPlayAudio() {
            // Create mock audio data (silent audio for testing)
            const sampleRate = 16000;
            const duration = 3; // 3 seconds
            const numSamples = sampleRate * duration;
            const audioData = new ArrayBuffer(numSamples * 2); // 16-bit samples
            
            console.log('Testing playAudio with mock data');
            recordingUI.playAudio(audioData, 'mp3');
            
            // Simulate progress updates
            simulateProgressUpdates();
        }

        function testPausePlayback() {
            console.log('Testing pausePlayback');
            recordingUI.pausePlayback();
        }

        function testReplayAudio() {
            console.log('Testing replayLastAudio');
            recordingUI.replayLastAudio();
        }

        // Simulate progress updates for testing
        let progressSimInterval = null;
        function simulateProgressUpdates() {
            if (progressSimInterval) {
                clearInterval(progressSimInterval);
            }

            let progress = 0;
            progressSimInterval = setInterval(() => {
                if (recordingUI.getAudioState() !== 'speaking') {
                    clearInterval(progressSimInterval);
                    progressSimInterval = null;
                    return;
                }

                // Simulate progress increment
                progress += 2;
                if (progress > 100) {
                    progress = 100;
                    clearInterval(progressSimInterval);
                    progressSimInterval = null;
                    // Simulate playback completion
                    setTimeout(() => {
                        recordingUI.setAudioState('idle');
                    }, 100);
                }

                // Mock the audioPlayback progress
                if (audioPlayback.getProgress) {
                    audioPlayback.currentProgress = progress;
                }
                updateStatus();
            }, 100);
        }

        // Initial status update
        updateStatus();

        console.log('RecordingUI test page loaded');
        console.log('Click buttons to test different states');
    </script>
</body>
</html>
