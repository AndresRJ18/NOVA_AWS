<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioPlayback Module Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
        }
        .status.error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .status.info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-bar {
            width: 100%;
            height: 30px;
            background-color: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin: 10px 0;
        }
        .progress-fill {
            height: 100%;
            background-color: #2196F3;
            transition: width 0.1s;
        }
        .info-box {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
        }
        input[type="range"] {
            flex: 1;
        }
    </style>
</head>
<body>
    <h1>AudioPlayback Module Test</h1>
    
    <div id="status" class="status info">
        Ready to test audio playback
    </div>

    <div class="info-box">
        <h3>Browser Support</h3>
        <p id="support-info">Checking...</p>
    </div>

    <div class="info-box">
        <h3>Load Audio File</h3>
        <input type="file" id="audioFile" accept="audio/mp3,audio/mpeg,audio/ogg,audio/webm">
        <p>Or use test URLs:</p>
        <button id="loadTestMp3">Load Test MP3</button>
        <button id="loadTestOpus">Load Test Opus</button>
    </div>

    <div class="controls">
        <button id="playBtn" disabled>▶ Play</button>
        <button id="pauseBtn" disabled>⏸ Pause</button>
        <button id="resumeBtn" disabled>▶ Resume</button>
        <button id="stopBtn" disabled>⏹ Stop</button>
        <button id="replayBtn" disabled>🔄 Replay</button>
    </div>

    <div class="info-box">
        <h3>Playback Progress</h3>
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
        <p>Progress: <span id="progressPercent">0</span>%</p>
        <p>Time: <span id="currentTime">0:00</span> / <span id="duration">0:00</span></p>
    </div>

    <div class="info-box">
        <h3>Volume Control</h3>
        <div class="volume-control">
            <span>🔇</span>
            <input type="range" id="volumeSlider" min="0" max="100" value="100">
            <span>🔊</span>
            <span id="volumeValue">100%</span>
        </div>
    </div>

    <div class="info-box">
        <h3>Playback Info</h3>
        <p>State: <span id="playbackState">Idle</span></p>
        <p>Format: <span id="audioFormat">-</span></p>
        <p>Size: <span id="audioSize">-</span></p>
    </div>

    <script src="audio-playback.js"></script>
    <script>
        const audioPlayback = new AudioPlayback();
        let progressUpdateInterval = null;
        let currentAudioData = null;
        let currentFormat = null;

        // UI elements
        const statusDiv = document.getElementById('status');
        const supportInfo = document.getElementById('support-info');
        const audioFileInput = document.getElementById('audioFile');
        const loadTestMp3Btn = document.getElementById('loadTestMp3');
        const loadTestOpusBtn = document.getElementById('loadTestOpus');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resumeBtn = document.getElementById('resumeBtn');
        const stopBtn = document.getElementById('stopBtn');
        const replayBtn = document.getElementById('replayBtn');
        const progressFill = document.getElementById('progressFill');
        const progressPercent = document.getElementById('progressPercent');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeValue = document.getElementById('volumeValue');
        const playbackState = document.getElementById('playbackState');
        const audioFormat = document.getElementById('audioFormat');
        const audioSize = document.getElementById('audioSize');

        // Check browser support
        const supported = audioPlayback.getSupportedFormats();
        supportInfo.innerHTML = `
            MP3: ${supported.mp3 ? '✓' : '✗'}<br>
            Opus: ${supported.opus ? '✓' : '✗'}
        `;

        // Set up completion callback
        audioPlayback.onComplete(() => {
            updateStatus('✓ Playback completed', 'success');
            updatePlaybackState();
            stopProgressUpdates();
        });

        // Load audio file
        audioFileInput.addEventListener('change', async (event) => {
            const file = event.target.files[0];
            if (!file) return;

            try {
                updateStatus('Loading audio file...', 'info');
                
                const arrayBuffer = await file.arrayBuffer();
                currentAudioData = arrayBuffer;
                
                // Detect format from file extension
                const extension = file.name.split('.').pop().toLowerCase();
                currentFormat = extension === 'ogg' || extension === 'opus' ? 'opus' : 'mp3';
                
                audioFormat.textContent = currentFormat.toUpperCase();
                audioSize.textContent = formatBytes(arrayBuffer.byteLength);
                
                updateStatus('✓ Audio file loaded', 'success');
                playBtn.disabled = false;
                replayBtn.disabled = false;
                
            } catch (error) {
                updateStatus(`✗ Error loading file: ${error.message}`, 'error');
            }
        });

        // Load test MP3 (using a data URL for demo)
        loadTestMp3Btn.addEventListener('click', async () => {
            updateStatus('Test MP3 not available in this demo. Please load your own file.', 'info');
        });

        // Load test Opus
        loadTestOpusBtn.addEventListener('click', async () => {
            updateStatus('Test Opus not available in this demo. Please load your own file.', 'info');
        });

        // Play button
        playBtn.addEventListener('click', async () => {
            if (!currentAudioData) {
                updateStatus('✗ No audio loaded', 'error');
                return;
            }

            try {
                updateStatus('Starting playback...', 'info');
                playBtn.disabled = true;
                
                await audioPlayback.play(currentAudioData, currentFormat);
                
                updateStatus('✓ Playing audio', 'success');
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                startProgressUpdates();
                updatePlaybackState();
                
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                playBtn.disabled = false;
                updatePlaybackState();
            }
        });

        // Pause button
        pauseBtn.addEventListener('click', () => {
            audioPlayback.pause();
            updateStatus('⏸ Paused', 'info');
            pauseBtn.disabled = true;
            resumeBtn.disabled = false;
            updatePlaybackState();
        });

        // Resume button
        resumeBtn.addEventListener('click', () => {
            audioPlayback.resume();
            updateStatus('▶ Resumed', 'success');
            resumeBtn.disabled = true;
            pauseBtn.disabled = false;
            updatePlaybackState();
        });

        // Stop button
        stopBtn.addEventListener('click', () => {
            audioPlayback.stop();
            updateStatus('⏹ Stopped', 'info');
            playBtn.disabled = false;
            pauseBtn.disabled = true;
            resumeBtn.disabled = true;
            stopBtn.disabled = true;
            stopProgressUpdates();
            updatePlaybackState();
        });

        // Replay button
        replayBtn.addEventListener('click', async () => {
            try {
                updateStatus('Replaying audio...', 'info');
                
                await audioPlayback.replay();
                
                updateStatus('✓ Replaying audio', 'success');
                pauseBtn.disabled = false;
                stopBtn.disabled = false;
                startProgressUpdates();
                updatePlaybackState();
                
            } catch (error) {
                updateStatus(`✗ Error: ${error.message}`, 'error');
                updatePlaybackState();
            }
        });

        // Volume control
        volumeSlider.addEventListener('input', (event) => {
            const volume = event.target.value / 100;
            audioPlayback.setVolume(volume);
            volumeValue.textContent = event.target.value + '%';
        });

        function startProgressUpdates() {
            if (progressUpdateInterval) return;
            
            progressUpdateInterval = setInterval(() => {
                const progress = audioPlayback.getProgress();
                const currentTime = audioPlayback.getCurrentTime();
                const duration = audioPlayback.getDuration();
                
                progressFill.style.width = progress + '%';
                progressPercent.textContent = Math.round(progress);
                currentTimeSpan.textContent = formatTime(currentTime);
                durationSpan.textContent = formatTime(duration);
            }, 100);
        }

        function stopProgressUpdates() {
            if (progressUpdateInterval) {
                clearInterval(progressUpdateInterval);
                progressUpdateInterval = null;
            }
            
            // Reset progress
            progressFill.style.width = '0%';
            progressPercent.textContent = '0';
            currentTimeSpan.textContent = '0:00';
        }

        function updatePlaybackState() {
            if (audioPlayback.isCurrentlyPlaying()) {
                playbackState.textContent = 'Playing';
            } else if (audioPlayback.isCurrentlyPaused()) {
                playbackState.textContent = 'Paused';
            } else {
                playbackState.textContent = 'Idle';
            }
        }

        function updateStatus(message, type) {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            audioPlayback.release();
        });
    </script>
</body>
</html>
